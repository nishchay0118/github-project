name: ci-cd practice
on:
  push:
    branches:
      - main
      - stage

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup environment
        uses: actions/setup-node@v4
        with:
          node-version: 20 

      - name: install dependences
        run: npm install

      - name: run test
        run: npm test

  stage:
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{secrets.DOCKER_TOCKEN }}

      - name: docker build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-img-stage:${{ github.sha }} .

      - name: push to dockerhub
        run: docker push ${{ secrets. DOCKER_USERNAME }}/node-img-stage:${{ github.sha }}

      - name: login to ec2 instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets. EC2_HOST }}
          username: ubuntu
          key: ${{ secrets. EC2_PEM_KEY }}
          script: |
            OLD_IMAGE=$(docker inspect node-app-stage --format='{{.Config.Image}}' 2>/dev/null || true)            
            echo "old image: $OLD_IMAGE"

            docker pull ${{ secrets. DOCKER_USERNAME }}/node-img-stage:${{ github.sha }}
            docker stop node-app-stage || true
            docker rm node-app-stage || true
            docker run -d -it -p 3001:3000 --name=node-app-stage ${{ secrets. DOCKER_USERNAME }}/node-img-stage:${{ github.sha }}

            sleep 10
            if curl -f http://localhost:3001/health; then
             echo "deployed successfully"
            else
             echo "deployed failed"
             docker stop node-app-stage || true
             docker rm node-app-stage || true

             if [ ! -z "$OLD_IMAGE" ]; then
              echo "rolling back"

              docker run -d -it -p 3001:3000 --name=node-app-stage $OLD_IMAGE
              fi
             exit 1
            fi 


  prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{secrets.DOCKER_TOCKEN }}

      - name: docker build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-img-prod:${{ github.sha }} .

      - name: push to dockerhub
        run: docker push ${{ secrets. DOCKER_USERNAME }}/node-img-prod:${{ github.sha }}

      - name: login to ec2 instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets. EC2_HOST }}
          username: ubuntu
          key: ${{ secrets. EC2_PEM_KEY }}
          script: |
            OLD_IMAGE=$(docker inspect node-app-prod --format='{{.Config.Image}}' 2>/dev/null || true)            
            echo "old image: $OLD_IMAGE"

            docker pull ${{ secrets. DOCKER_USERNAME }}/node-img-prod:${{ github.sha }}
            docker stop node-app-prod || true
            docker rm node-app-prod || true
            docker run -d -it -p 3000:3000 --name=node-app-prod ${{ secrets. DOCKER_USERNAME }}/node-img-prod:${{ github.sha }}

            sleep 10
            if curl -f http://localhost:3000/health; then
             echo "deployed successfully"
            else
             echo "deployed failed"
             docker stop node-app-prod || true
             docker rm node-app-prod || true

             if [ ! -z "$OLD_IMAGE" ]; then
              echo "rolling back"

              docker run -d -it -p 3000:3000 --name=node-app-prod $OLD_IMAGE
              fi
             exit 1
            fi 

